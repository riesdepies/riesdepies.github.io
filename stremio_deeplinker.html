<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stremio Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0d19; color: white; }
        .stremio-purple { background-color: #8151d1; }
        .stremio-purple:hover { background-color: #6b3fb5; }
        input, select { background-color: #1e1b2e !important; border: 1px solid #3d375e !important; color: white !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#161424] p-8 rounded-2xl shadow-2xl border border-gray-800">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold mb-2">Stremio Linker</h1>
            <p class="text-gray-400 text-sm">Genereer een deeplink met metadata voor de juiste ondertitels.</p>
        </div>

        <div class="space-y-4">
            <!-- Media Type -->
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider mb-1 text-gray-500">Type</label>
                <select id="type" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-purple-500" onchange="toggleSeriesFields()">
                    <option value="movie">Film</option>
                    <option value="series">Serie</option>
                </select>
            </div>

            <!-- IMDb ID of URL -->
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider mb-1 text-gray-500">IMDb ID of URL</label>
                <input type="text" id="imdb" placeholder="tt1234567 of volledige link" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <!-- Series Fields (Hidden by default) -->
            <div id="series-fields" class="hidden flex space-x-4">
                <div class="flex-1">
                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1 text-gray-500">Seizoen</label>
                    <input type="number" id="season" value="1" class="w-full p-3 rounded-lg outline-none">
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1 text-gray-500">Aflevering</label>
                    <input type="number" id="episode" value="1" class="w-full p-3 rounded-lg outline-none">
                </div>
            </div>

            <!-- Stream URL -->
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider mb-1 text-gray-500">Stream URL (Video link)</label>
                <input type="text" id="stream" placeholder="https://site.com/video.mp4" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <!-- Knoppen -->
            <div class="space-y-3">
                <button onclick="openStremio()" class="w-full stremio-purple py-4 rounded-xl font-bold text-lg transition-all transform active:scale-95 shadow-lg">
                    Open in Stremio
                </button>
                <button onclick="copyDeeplink()" id="copyBtn" class="w-full bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-semibold text-sm transition-all">
                    📋 Deeplink kopiëren
                </button>
            </div>
        </div>

        <p id="error" class="mt-4 text-red-400 text-sm text-center hidden italic"></p>
        <p id="success" class="mt-2 text-green-400 text-sm text-center hidden italic"></p>
    </div>

    <script>
        // ---- Basisinstellingen ----
        const fields = {
            type: document.getElementById('type'),
            imdb: document.getElementById('imdb'),
            stream: document.getElementById('stream'),
            season: document.getElementById('season'),
            episode: document.getElementById('episode'),
            seriesFields: document.getElementById('series-fields'),
            error: document.getElementById('error'),
            success: document.getElementById('success'),
            copyBtn: document.getElementById('copyBtn')
        };

        // ---- Onthouden van ingevoerde gegevens (localStorage) ----
        function saveData() {
            const data = {
                type: fields.type.value,
                imdb: fields.imdb.value,
                stream: fields.stream.value,
                season: fields.season.value,
                episode: fields.episode.value
            };
            localStorage.setItem('stremioLinker', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('stremioLinker');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.type) fields.type.value = data.type;
                    if (data.imdb) fields.imdb.value = data.imdb;
                    if (data.stream) fields.stream.value = data.stream;
                    if (data.season) fields.season.value = data.season;
                    if (data.episode) fields.episode.value = data.episode;
                } catch (e) { /* negeer corrupte data */ }
            }
            toggleSeriesFields(); // pas UI aan op basis van opgeslagen type
        }

        // Sla op bij elke wijziging
        ['type', 'imdb', 'stream', 'season', 'episode'].forEach(id => {
            document.getElementById(id).addEventListener('input', saveData);
            document.getElementById(id).addEventListener('change', saveData);
        });

        // ---- Serievelden tonen/verbergen ----
        function toggleSeriesFields() {
            const show = fields.type.value === 'series';
            fields.seriesFields.classList.toggle('hidden', !show);
            saveData();
        }

        // ---- IMDb ID extraheren ----
        function extractImdbId(input) {
            const match = input.match(/tt\d+/);
            return match ? match[0] : null;
        }

        // ---- Base64-codering voor de stream-URL (veilig voor alle URL's) ----
        function base64EncodeUrl(url) {
            // encodeURIComponent geeft UTF-8 bytes, btoa werkt op Latin1.
            // Daarom eerst naar bytes converteren.
            return btoa(unescape(encodeURIComponent(url)));
        }

        // ---- Deeplink genereren ----
        function generateDeeplink() {
            const type = fields.type.value;
            const imdbInput = fields.imdb.value;
            const streamUrl = fields.stream.value.trim();

            const imdbId = extractImdbId(imdbInput);
            if (!imdbId || !streamUrl) return null;

            let finalId = imdbId;
            if (type === 'series') {
                const s = fields.season.value || 1;
                const e = fields.episode.value || 1;
                finalId = `${imdbId}:${s}:${e}`;
            }

            const encodedStream = base64EncodeUrl(streamUrl);
            return `stremio://player/${encodedStream}/${type}/${finalId}`;
        }

        // ---- Openen in Stremio ----
        function openStremio() {
            fields.error.classList.add('hidden');
            fields.success.classList.add('hidden');

            const deeplink = generateDeeplink();
            if (!deeplink) {
                fields.error.innerText = "Zorg voor een geldig IMDb ID en Stream URL.";
                fields.error.classList.remove('hidden');
                return;
            }

            window.location.href = deeplink;
        }

        // ---- Deeplink kopiëren naar klembord ----
        function copyDeeplink() {
            fields.error.classList.add('hidden');
            fields.success.classList.add('hidden');

            const deeplink = generateDeeplink();
            if (!deeplink) {
                fields.error.innerText = "Vul eerst alle velden correct in.";
                fields.error.classList.remove('hidden');
                return;
            }

            navigator.clipboard.writeText(deeplink).then(() => {
                fields.success.innerText = "Deeplink gekopieerd!";
                fields.success.classList.remove('hidden');
                setTimeout(() => fields.success.classList.add('hidden'), 3000);
            }).catch(() => {
                // Fallback voor oudere browsers
                const textArea = document.createElement('textarea');
                textArea.value = deeplink;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                fields.success.innerText = "Deeplink gekopieerd!";
                fields.success.classList.remove('hidden');
                setTimeout(() => fields.success.classList.add('hidden'), 3000);
            });
        }

        // ---- Start: laad opgeslagen data ----
        loadData();
    </script>
</body>
</html>
